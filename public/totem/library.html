<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Libreria maschere — geometrico</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0a0a12; color: #c9c4db;
      font-family: system-ui, -apple-system, sans-serif; padding: 24px 16px 56px; }
    h1 { font-size: 16px; letter-spacing: .16em; text-transform: uppercase; text-align: center;
         color: #f5c451; font-weight: 800; margin: 0 0 4px; }
    p.sub { text-align: center; color: #6f6a82; font-size: 12px; margin: 0 0 22px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px;
            max-width: 1000px; margin: 0 auto; }
    .card { background: #14111f; border: 1px solid #1e1a2e; border-radius: 16px; padding: 10px; }
    .card img { display: block; border-radius: 10px; width: 100%; }
    .cap { text-align: center; margin-top: 8px; font-size: 12px; color: #f5c451;
           letter-spacing: .08em; text-transform: uppercase; }
    @media (max-width: 620px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Libreria maschere · stile geometrico</h1>
  <p class="sub">64 forme + espressioni miste · base per i totem random per-persona</p>
  <div class="grid">
    <div class="card"><img src="geo/geo1.png" alt="fierce" /><div class="cap">feroce / guerra</div></div>
    <div class="card"><img src="geo/geo2.png" alt="calm" /><div class="cap">calmo / gioioso</div></div>
    <div class="card"><img src="geo/geo3.png" alt="wild" /><div class="cap">wild / sorpreso</div></div>
    <div class="card"><img src="geo/geo4.png" alt="mystic" /><div class="cap">mistico / malinconico</div></div>
  </div>
</body>
</html>
