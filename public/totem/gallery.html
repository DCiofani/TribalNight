<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Totem — libreria & totem random</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; background: #0a0a12; color: #c9c4db;
      font-family: system-ui, -apple-system, sans-serif; padding: 22px 16px 56px;
    }
    h1 { font-size: 15px; letter-spacing: .16em; text-transform: uppercase;
         text-align: center; color: #f5c451; font-weight: 700; margin: 30px 0 4px; }
    h1:first-child { margin-top: 0; }
    p.sub { text-align: center; color: #6f6a82; font-size: 12px; margin: 0 0 18px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
    .card { background: #14111f; border: 1px solid #1e1a2e; border-radius: 16px; padding: 10px; }
    .card img { display: block; border-radius: 10px; }
    .totem img { width: 230px; }
    .sheet img { width: 460px; max-width: 88vw; }
    .cap { text-align: center; margin-top: 8px; font-size: 12px; color: #f5c451;
           letter-spacing: .08em; text-transform: uppercase; }
    hr { border: none; border-top: 1px solid #1e1a2e; margin: 36px auto; max-width: 760px; }
  </style>
</head>
<body>
  <h1>Libreria glyph — ~48 forme maschere</h1>
  <p class="sub">geometrie + facce variate, stilizzate dalle tiki · line-glow</p>
  <div class="row">
    <div class="card sheet"><img src="varied/sheet.png" alt="sheet A" /><div class="cap">A · base</div></div>
    <div class="card sheet"><img src="more/sheetB.png" alt="sheet B" /><div class="cap">B · animali</div></div>
    <div class="card sheet"><img src="more/sheetC.png" alt="sheet C" /><div class="cap">C · natura/cosmico</div></div>
  </div>

  <hr />

  <h1>Totem — stack random vario (9)</h1>
  <p class="sub">forme/taglie diverse impilate irregolari · 1 variante viola</p>
  <div class="row">
    <div class="card totem"><img src="varied/t1.png" alt="t1" /><div class="cap">cornuto</div></div>
    <div class="card totem"><img src="varied/t2.png" alt="t2" /><div class="cap">foglie</div></div>
    <div class="card totem"><img src="varied/t3.png" alt="t3" /><div class="cap">geometrico</div></div>
    <div class="card totem"><img src="more/t_fierce.png" alt="fierce" /><div class="cap">fierce</div></div>
    <div class="card totem"><img src="more/t_leafy.png" alt="leafy" /><div class="cap">leafy</div></div>
    <div class="card totem"><img src="more/t_cosmic.png" alt="cosmic" /><div class="cap">cosmic</div></div>
    <div class="card totem"><img src="more/t_wild.png" alt="wild" /><div class="cap">wild</div></div>
    <div class="card totem"><img src="more/t_tall.png" alt="tall" /><div class="cap">tall</div></div>
    <div class="card totem"><img src="more/t_violet.png" alt="violet" /><div class="cap">viola</div></div>
  </div>
</body>
</html>
