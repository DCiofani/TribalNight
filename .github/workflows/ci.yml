name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Lint · Typecheck · Build (PWA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          # build statico: nessuna chiamata Supabase a build-time, valori fittizi sufficienti
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build
          NEXT_PUBLIC_APP_NAME: Totem Night

  migration:
    name: Migrazione v0.2 + contract/RLS test (Postgres reale)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: totem
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB: postgres://postgres:postgres@localhost:5432/totem
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/totem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci
      - name: Prelude (shim ruoli + auth)
        run: psql "$DB" -v ON_ERROR_STOP=1 -f supabase/ci/prelude.sql
      - name: Apply migrations (clean, in ordine)
        run: |
          for f in supabase/migrations/*.sql; do
            echo "── applying $f"
            psql "$DB" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Assert contratto v0.2
        run: psql "$DB" -v ON_ERROR_STOP=1 -f supabase/ci/assert.sql
      - name: Contract/RLS/idempotenza test (M1-S2, esecuzione reale)
        run: npm test
      # Nota: lo schema NON è re-runnable as-is (create policy/role senza guardie) — vedi
      # docs/design/v0.2-reconciliation.md (gap idempotenza). Le migrazioni Supabase
      # girano una volta sola.
